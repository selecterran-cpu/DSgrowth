<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B tv 전단지 - 내 번호로 만들기</title>
<style>
  :root{
    --blue:#1a56c4;
    --blue-dark:#0d2b6b;
    --bg:#f2f5fb;
    --card:#ffffff;
    --border:#dbe4f3;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:var(--bg);
    color:#1c2433;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 16px 60px;
  }
  h1{
    font-size:20px;
    margin:0 0 4px;
    color:var(--blue-dark);
  }
  p.desc{
    margin:0 0 20px;
    font-size:14px;
    color:#5b6472;
    text-align:center;
  }
  .panel{
    width:100%;
    max-width:420px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:18px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(20,40,90,0.06);
  }
  label{
    display:block;
    font-size:13px;
    font-weight:700;
    margin-bottom:6px;
    color:var(--blue-dark);
  }
  input[type="text"]{
    width:100%;
    font-size:18px;
    font-weight:700;
    padding:12px 14px;
    border:2px solid var(--border);
    border-radius:10px;
    outline:none;
    letter-spacing:0.5px;
  }
  input[type="text"]:focus{
    border-color:var(--blue);
  }
  .btnrow{
    display:flex;
    gap:10px;
    margin-top:14px;
  }
  button{
    flex:1;
    font-size:15px;
    font-weight:700;
    padding:12px 10px;
    border-radius:10px;
    border:none;
    cursor:pointer;
  }
  #downloadBtn{
    background:var(--blue);
    color:#fff;
  }
  #downloadBtn:disabled{
    background:#a9b8d8;
    cursor:not-allowed;
  }
  #resetBtn{
    background:#eef1f7;
    color:#33415c;
  }
  .canvas-wrap{
    width:100%;
    max-width:420px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:10px;
    box-shadow:0 2px 10px rgba(20,40,90,0.06);
  }
  canvas{
    width:100%;
    height:auto;
    display:block;
    border-radius:8px;
  }
  .hint{
    font-size:12px;
    color:#8a93a3;
    margin-top:8px;
    text-align:center;
  }
  footer{
    margin-top:24px;
    font-size:12px;
    color:#9aa3b2;
    text-align:center;
  }
</style>
</head>
<body>

<h1>B tv 전단지 번호 변경기</h1>
<p class="desc">전화번호만 입력하면 내 번호가 들어간 홍보 이미지가 자동으로 만들어져요.</p>

<div class="panel">
  <label for="phoneInput">전화번호</label>
  <input type="text" id="phoneInput" inputmode="numeric" placeholder="010-1234-5678" maxlength="14">
  <div class="btnrow">
    <button id="downloadBtn">이미지 다운로드</button>
    <button id="resetBtn" type="button">초기화</button>
  </div>
</div>

<div class="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>
<p class="hint">완성된 이미지는 그대로 저장해서 문자, 카톡, 블로그 등에 사용하세요.</p>

<footer>made with ❤ · GitHub Pages</footer>

  function autoHyphenPhone(raw){
    const num = raw.replace(/[^0-9]/g, "").slice(0, 11);

    if (width > maxWidth) {
      fontSize = Math.max(16, Math.floor(fontSize * (maxWidth / width)));
      ctx.font = `bold ${fontSize}px ${FONT_FAMILY}`;
    }

    ctx.fillStyle = "#000000";
    ctx.textBaseline = "alphabetic";
    ctx.textAlign = "left";
    ctx.fillText(text, TEXT_START_X, TEXT_BASELINE_Y);
  }

  phoneInput.addEventListener("input", function(e){
    const cursorWasAtEnd = e.target.selectionStart === e.target.value.length;
    const formatted = autoHyphenPhone(e.target.value);
    e.target.value = formatted;
    if (cursorWasAtEnd) {
      e.target.selectionStart = e.target.selectionEnd = formatted.length;
    }
    render();
  });

  resetBtn.addEventListener("click", function(){
    phoneInput.value = "";
    render();
  });

  downloadBtn.addEventListener("click", function(){
    if (!imgLoaded) return;
    const link = document.createElement("a");
    const numOnly = phoneInput.value.replace(/[^0-9]/g, "") || "flyer";
    link.download = `B_tv_전단지_${numOnly}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
})();
</script>

</body>
</html>
